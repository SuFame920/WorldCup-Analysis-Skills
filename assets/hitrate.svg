<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 296" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="2" y="2" width="756" height="292" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="24" y="28" font-size="15" font-weight="700" fill="#1f2328">近 7 日命中率趋势</text>

  <!-- legend -->
  <rect x="528" y="17" width="14" height="14" rx="3" fill="#2563eb"/>
  <text x="547" y="28" font-size="12" fill="#374151">分项</text>
  <rect x="612" y="17" width="14" height="14" rx="3" fill="#f59e0b"/>
  <text x="631" y="28" font-size="12" fill="#374151">逐档</text>

  <!-- y gridlines + labels -->
  <g stroke="#eef0f2" stroke-width="1">
    <line x1="58" y1="50"  x2="702" y2="50"/>
    <line x1="58" y1="100" x2="702" y2="100"/>
    <line x1="58" y1="150" x2="702" y2="150"/>
    <line x1="58" y1="200" x2="702" y2="200"/>
    <line x1="58" y1="250" x2="702" y2="250"/>
  </g>
  <g font-size="11" fill="#9ca3af" text-anchor="end">
    <text x="50" y="54">100%</text>
    <text x="50" y="104">75%</text>
    <text x="50" y="154">50%</text>
    <text x="50" y="204">25%</text>
    <text x="50" y="254">0%</text>
  </g>

  <!-- x day labels -->
  <g font-size="11" fill="#9ca3af" text-anchor="middle">
    <text x="60"  y="270">06-17</text>
    <text x="166.7" y="270">06-18</text>
    <text x="273.3" y="270">06-19</text>
    <text x="380" y="270">06-20</text>
    <text x="486.7" y="270">06-21</text>
    <text x="593.3" y="270">06-22</text>
    <text x="700" y="270">06-23</text>
  </g>

  <!-- 逐档 line: 06-21 24% / 06-22 47% / 06-23 35% -->
  <polyline points="486.7,202 593.3,156 700,180" fill="none" stroke="#f59e0b" stroke-width="2.5"/>
  <circle cx="486.7" cy="202" r="4" fill="#f59e0b"/>
  <circle cx="593.3" cy="156" r="4" fill="#f59e0b"/>
  <circle cx="700" cy="180" r="4" fill="#f59e0b"/>
  <text x="486.7" y="216" font-size="11" font-weight="600" fill="#b45309" text-anchor="middle">24%</text>
  <text x="593.3" y="170" font-size="11" font-weight="600" fill="#b45309" text-anchor="middle">47%</text>
  <text x="700" y="194" font-size="11" font-weight="600" fill="#b45309" text-anchor="end">35%</text>

  <!-- 分项 line: 06-21 45% / 06-22 70% / 06-23 55% -->
  <polyline points="486.7,160 593.3,110 700,140" fill="none" stroke="#2563eb" stroke-width="2.5"/>
  <circle cx="486.7" cy="160" r="4" fill="#2563eb"/>
  <circle cx="593.3" cy="110" r="4" fill="#2563eb"/>
  <circle cx="700" cy="140" r="4" fill="#2563eb"/>
  <text x="486.7" y="150" font-size="11" font-weight="600" fill="#1d4ed8" text-anchor="middle">45%</text>
  <text x="593.3" y="100" font-size="11" font-weight="600" fill="#1d4ed8" text-anchor="middle">70%</text>
  <text x="700" y="130" font-size="11" font-weight="600" fill="#1d4ed8" text-anchor="end">55%</text>
</svg>
